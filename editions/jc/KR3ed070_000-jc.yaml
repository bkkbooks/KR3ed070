body:
  text: 顧左二十六歲久遺傷腎腎虛內熱多冷傷衛衛虛力倦坎離少交寤寐夢紛宜育陰炙鱉甲綿耆秦艽蒺藜根生地茯苓牡蠣桑葉潞黨參廣皮龜版首烏藤朱左四十三歲腎不納氣睥不化濕喘急痰飲由來三年近日肺家又為火燥聲嘶音啞咽燥喉庠喉痹形狀已達目的靈磁石橘紅鳳凰衣淮牛膝叭杏仁川貝赤苓淡甘草生薏仁桔梗元參枇杷葉吳左三十歲無夢而滑謂之腎虧腰背痠楚是其證也炙龜版杜肥知母澤瀉炙鱉甲茯苓丹皮牛膝川黃柏牡蠣白芍蒺藜陳左五十一歲肺虛作咳腎虛作喘年已五十欲杜其根恐難言矣粉沙參茯淡甘草牛膝叭杏仁白前白石英半夏冬蟲草川貝楷杷葉橘紅楊左三十三歲腎陰下虧為精滑肺火上焰為喉癢經絡又為痰阻氣機亦被濕困腹笥時急時痮腰背乍痠乍痛左脈弦數舌質白膩當育肝腎以潛龍相青龍骨牡蠣廣皮金鈴子潼蒺藜丹皮茯苓炙龜版川貝母白芍蓮鬚元參徐右二十七歲血海多熱經水淋漓陽絡多火鼻衄上出紫胡炒當歸丹參白芍茶花淮牛膝丹皮佛手柑桑葉女貞子茯神茺蔚海螵蛸張左浮腫屬脾咳嗆屬肺葶藶瀉上之氣五苓滲中之濕甜葶蘑豬苓川桂華澄茄茅朮廣皮防風骷髏制川樸澤瀉術茯苓吳右六十三歲肝腎不足濕火乘虛下注氣血俱傷帶下赤白並見砂仁搗熟地萸肉丹皮冬朮海螵蛸茯苓杜仲山藥制首烏蓮鬚萆薢白芍吳左三十五歲上冬會發便毒愈後餘邪逗遛挾肝之風陽犯陽明沖巔或有頭痛或有脘泛咽喉雨旁發現白糜關尺脈象均見效大和肝胃潛風陽川連桑葉白芍天麻萆薢元參鉤鉤竹茹決明銀花橘紅滁菊沈左五十一歲外症之後旋即氣急筋掣足腫氣血雨虧綿杜仲牡蠣炙綿耆忍冬藤宣木瓜白芍絲瓜絡會皮川斷肉當歸防風牛膝葉左三十六歲脈滑屬痰脅痕屬氣痰聚氣機不通則痮萊菔子瓜蔞橘紅竹茹瓦楞子絲瓜枳殼砂殼白芥子腹皮茯苓冬瓜子皮沈右十八歲形瘦咳嗽食少停經乾血勞瘵已見一斑紫胡炒白芍川貝丹皮牡蠣炙鱉甲茯神莞蔚桑葉淮牛膝地骨皮丹參穀芽馬右十六歲氣分積濕腑陽窒郁當臍作痛中脘嘔泛心有悸動脈見緊弦溫連宜濕藉和肝脾陳枳殼金鈴子烏藥路路通小茴炒白芍延胡索青皮墓茄制香附姜半夏茯神官桂俞左二十二歲老病肝氣少腹作痮新病濕溫遍體酸楚頭蒙耳聾寐夢譫語舌白脈濡面㿠肢掣濕溫已從痰化猶慮風動作痙大蠍尾桑葉苡仁竹茹川通草酒炒黃芩茯苓膽星焦山梔連翹橘紅滁菊欽右三十歲血中風熱透出肌肉發現紅塊上下俱有咳嗆少痰咽喉喉庠大便實結小便火熱脈象細弦而數舌質膩黃而燥肺肝挾有風熱脾胃蘊蓄濕火宜先清風熱青蛤散川貝桔梗淡甘草粉丹皮白杏仁元參桑葉絲瓜絡冬藤滁菊枇杷葉張左四十九歲肝氣化風脾濕生痰互相上擾先咳後眩明天麻川貝竹茹甘草純鉤鉤滁菊桑葉白芍准牛膝姜夏石決廣皮蘆左十九歲先天不足後天又虧年將弱冠猶未身發或瘧或血此長彼消上損已及中交咳嗆兼有嘔惡盜汗淋漓夜不安寐脈象細數無神舌質薄白而潤兩補氣血是為正當炙綿耆貝母浮小麥桑葉炙甘草穭衣牡蠣黨參白杏仁夏粬橘紅茯苓倪童十三歲無痰不癇無風不厥風痰熾盛癇厥頻作瓦楞子法夏黃沉香竹茹石決明滁菊淡甘草膽星風化硝礞石砂茯神橘紅沈右二十二歲肺主氣氣虛多咳惡寒肝藏血血虛心悸煩熱舊冬蓐後元虛未復脈弦舌白當用潛育炙耆皮牡蠣川貝丹參熟半夏螵蛸白芍炙草南北沙參苓神橘紅蘇子吳童暑濕傷氣積食傷脾不從瘧化更患便積身熱腹滿當用利中佐以泄熱廣木香淨銀花腹皮秦皮白頭翁焦神粬查肉荷蒂川雅連帶皮苓川柏酒芩徐左三十二陰虛火旺氣逆金傷先患純血繼而痰血川貝母旱蓮元參茅根女貞子丹皮蛤散功勞水炒膏牛膝橘紅知母張右把握不靈麻木不仁偏於右手此風勝也炒當歸桑枝絲瓜絡白芍五加成木瓜忍冬秦艽川桂枝丹參首烏防風彭孩無方頸項強急此痙厥之徵兆目斜咳嘔乃慢驚之基礎未至周歲純陽不足照此形狀力有不逮吳右四十歲休息痢仍作惟下數較稀色見赤白氣血俱傷患起一年脾腎亦虧脈來弦細舌質薄膩仿用繆氏脾腎雙補炒槐米於朮肉菓兔絲餅巴戟天扁豆山藥新會皮破故紙茯苓甘草潞黨參萬左二十三歲三瘧本從陰出愈後陰分更虧或寒或熱忽往忽來扁石斛酒芩秦艽丹皮銀柴胡淡草鱉甲橘紅絲瓜絡骨皮蒿梗桑葉汪右三十三歲水不涵木血少濡肝氣升難寐瘕聚塊痛心悸筋掣頭暈耳鳴食減脘悶咳逆痰多顯然肝侮土木刑金左脈弦細舌苔黃膩拙擬抑木和肝參入養金瀉火旋覆花代赭絲瓜絡生苡仁石決明茯神貝母玟瑰炒竹茹西洋參橘紅代代花東瓜子皮陳左二十四歲失情積勞積鬱氣逆咳血咳痰面色萎黃舌質薄白氣分似有濕熱治法非宜滋補瓦楞子橘紅白前苡仁綿茵陳蘇子桑葉冬瓜子白杏仁茯神貝母竹茹崔左二十歲前次濁氣在上腹笥䐜脹現在清氣在下大便溏瀉綿茵陳制川樸澤瀉茯苓粉豬苓桂枝炒白芍二皮冬瓜子皮廣木香姜半夏苡仁冬朮徐右二十七歲血海多熱經水淋漓陽絡多火鼻衄上出厥陰偏旺變症百出柴炒當歸丹參海螵茺蔚准牛膝茯神山茶香柑奎白芍女貞丹皮桑葉沈右二十六歲產育六年未獲復孕經來腹痛逾時瘕升冬風皮海螵香蟲茯神柴炒白芍丹參吞附佛手川鬱金丹皮牛膝八月扎金左十七歲癇中兼厥迭見三次肝膽風陽挾痰上擾明天麻橘紅滁菊牛膝石決明釣釣茯神丹皮黑知母丹參膽星桑葉李左六十五歲肝氣挾飲流入脈絡自脅至腹疼痛兼脹究其受病之源不外情郁二字旋覆花白芥子茯苓姜竹茹法半夏瓦楞子桂芍歸鬚絲瓜絡新絳路路通橘絡紅高左二十五歲咳而無痰謂之肺燥久咳傷絡慮其見血功勞葉冬瓜子桑葉耙枇葉淡甘草杏仁元參桔梗青蛤散橘紅梨子白茅根沈左四十八歲由瀉轉積積行旬余腰腹俱痛翻數猶多江西術查肉苡仁扁豆廣木香訶子車前荷蒂陽春砂茯苓骨脂廣皮左十六歲不咳喀血腹痛便血左脅痞滿清運治之炙鱉甲大腹青皮海蜇絲瓜絡蓬朮白芍藤皮冬瓜皮當歸桃仁茯苓陸左十九歲肺受風熱脾積濕熱形寒形熱咳逆咳痰煆蛤亮前胡苡仁杏仁冬瓜子皮川貝淡草青蒿銀柴胡蘇子橘紅竹茹陳左先咳後血定是火燥傷絡體癢牙癍亦是火蒸胃絡粉丹皮川貝枇耙葉蘇子忍冬藤蛤粉白茅根杏仁絲瓜絡橘紅蘆根竹茹陳左四十八歲浮痘稍減咳嗆仍劇肺不降氣脾不化濕姜半夏橘紅酥子川具准牛膝杏仁茯苓骷髏冬瓜子皮川樸桑皮大腹陳左二十五歲腹痛下血已有五年脾胃致傷統血失司制川樸葛根冬朮紅棗炒槐米茯苓廣皮白芍廣木香芸粬智仁扁豆沈左二十一歲左右脈象均見弦細滿苔舌質頗形滋白弦為飲邪細為陰虧舌白中焦定為寒濕腹有動氣脅有絡掣肝陽時有勃動太陽時有痛痕詢悉情志多郁致傷肝木治法須當利肝以舒絡脈廣鬱金桑葉絲瓜絡橘紅法半夏滁菊白芍竹茹冬瓜子皮茯神川貝丹參沈左三十四歲腹笥作痛胃納式微面黃少華舌白帶剝脾胃升降失調寒濕盤留不化大腹皮穀芽茯苓路路通枳殼青皮金鈴子小茴香吞櫞皮砂殼建曲沉香葉左四十歲恩慮傷脾怒郁傷肝便泄經久劇於半夜有時心亂神呆將來難免怔忡切脈細弦當用潛連石葛蒲遠志秫米棗仁巴戟天茯神會皮西術廣木香交藤半夏丹參劉左脅下痞滿偏在於左陰虛絡阻何疑舌見紅刺脈來細數火旺津傷之兆細生地青皮丹皮白芍炙鱉甲金鈴子川斛絲瓜絡左牡蠅橘紅桑葉當歸潘右四十三歲木叩金鳴咳嗆一年已見氣急殊難杜根舌質黃膩脈象弦滑上下氣少攝納藥餌不過苟延白石英白前川貝枇耙葉瓦楞子淡甘草苡仁竹茹准牛膝茯苓橘紅半夏曲王右體素陰虧症見叢雜近加情志不樂致傷脾肝氣營玉蝴蝶白芍八月扎牡蠣法半夏穀芽青皮腹皮製香附昆布絲瓜絡橘紅周左二十歲鼻紅有根咳嗆四年舊秋會經痰紅今春屢見寒熱肺腎陰分有虧肝膽氣火偏旺脈細數當潛降粉丹皮雲苓川貝茅根准牛膝苡仁蛤殼首烏女貞子茶花白芍橘紅吳左膏方補肝營藉利筋絡益腎陰而戕筋骨大熟地枸杞子黨參靈仙宣木瓜白芍綿耆忍冬淮牛膝當歸首烏狗脊制玉竹川斷兔絲鎖陽淡從蓉龍膽杜仲坎版右藥濃煎二次去渣存質加隨皮膠虎骨膠溶化收膏每用一匙開水化服周右坎陽不足脾土又虧便溏實脈細無力肝腎陰分亦虧浮火上乘傍晚目紅而瘇髓骨作痛溫補三陰以資灌溉東洋參杜仲白芍二皮宣木瓜鹿霜於朮肉菓淡川附霞面骨脂杞子又膏方益真陽以溫脾土補真陰以處肝木大熟地於朮白芍骨脂制萸肉吳萸杜仲山藥東洋參甘草兔絲首烏霞天曲澤瀉黃耆歸身巴戟天茯苓肉菓杞干宣木瓜右藥煎三次取濃質以鹿角膠驢皮膠濃化收膏季左左脈弦右脈滯舌質潤苔色黃肝腎陰分積虛虛則生風生火肝腎氣分有虧虧則生濕生痰風無形易蒙清孔頭痛偏左目瘇肢振痰有形易阻氣機脘悶嘔惡便下不暢先消理後滋補姜半夏廣皮滁菊桑葉石決明肫皮蒺藜芽谷明天麻鉤鉤茯苓竹茹又膏方滋坎水以濟離火柔巽木而安坤土大熟地苓神杞子山藥紛丹皮滁菊坎版鱉甲淡從蓉生地首烏澤瀉制萸肉冬朮牛膝牡蠣奎白芍潞黨歸身桑葉右藥漫煎三次入驢皮膠收膏陳左濕旺之體質木火之用事夏令四肢麻木冬令鼻竅流水有夢而遺無夢而滑原由肝腎不足遂使坎離失濟脈象左弦右細治法先宜潛育大生地茶花石決茅根扁石斛女貞白芍桑葉焙丹皮坎版旱蓮牡蠣又膏方肢麻甚於廈令鼻水劇於冬令有時夢遺有時精滑本病龍相火旺標病濕痰偏勝值此冬令舍標求本用擬膏方以資調理牡蠣坎版大生地萸肉滁菊茯苓旱蓮草首烏杞子桑葉山茶花丹皮丹參蓮鬚扁石斛女貞白芍茅根淡從蓉鱉甲右藥煎三次取濃汁以驢皮膠收膏許左三春咳嗆至夏始愈八月咳嗆至今未巳肺不降氣腎不納氣動則喘急靜則平緩咳而脅痛絡傷防血素有遺血早傷腎陰脈象堅數法當清肅旋覆蛤散竹茹桑葉杏仁川貝絲瓜絡枇杷露牛膝石英毛燕橘紅翁左右脈柔小左脈數大小為陰虧大為陽亢年未弱冠夢有遺泄趁此冬令先宜培養熟地萸肉山藥丹皮澤瀉歸身白芍杞子生地綿耆潞黨坎版鱉甲沙苑遠志蓮鬚右藥以驢皮膠收膏江左四十歲病久陰虛虛則生熱熱蒸於肺便為咳嗆形瘦膚燥力疲脈細若不冬令調治春令便有難救旋覆花橘紅夏曲枇杷葉毛燕根川貝雲苓竹茹川石斛牛膝蟲草扁豆陳右陰虛生熱氣滯作脘腹又為痞滿咳嗆時有上逆汛參亂法逍遙莞蔚子楞子青皮白芍柴胡當歸香蟲鬱金腹皮枳殼香附丹參川貝沈左脅痞腹痛由來已久肝強脾弱寒濕蟠覆川桂枝川樸腹皮茯苓消茅朮青皮首烏東瓜皮瓜蔞皮枳殼穀芽白芍富左四十三歲疼痛偏於左太陽麻木甚於右手指遍體廢楚兩膝痿耍外風內濕走經入絡甫有二月已成痹症膽胃又為痰阻人夜為之少寐脈寸浮法溫通桂枝炒白芍防己秦艽竹茹仙半夏秫米滁菊桑枝葉川萆橘紅茯神沈左真陰不能治浮陽真水不能制虛火形瘦善食口渴喜飲脾家又為木侮腹笥遂為滿舌質光降脈象浮弦濟水火育陰陽大生地丹皮澤瀉麥冬上猺桂茯苓黃柏天冬制萸肉知母白芍山藥沈右三十三歲咳嗆白沫痰帶咸氣營分有熱月泛早期元胡炒白芍橘紅蛤散歸身杜仲茺蔚丹皮杏仁牛膝丹參枇耙葉茯神陳右二十歲逢節吐血已有半年泛停一月有餘先起悲怒後因驚恐紫丹參石決明白芍女貞旋覆花橘紅雲苓貝母粉丹皮佛手柑牛膝茅根朱右三十歲血虛營熟氣鬱生火月泛延期淨後身熱制香附牛膝榮胡薄荷葉焦山梔丹麥川芎歸身鮮石斛丹皮白芍月季花錢右二十三歲浮腫半年經停四月氣血兩阻寒濕兩勝柴炒歸身砂谷茺蔚子川芎桂炒白芍廣皮腹皮椽皮枳炒冬朮香附苓皮澤瀉陳右四十六歲始而帶下繼而血漏失血腸燥大便為難仙夏麻仁丹參白芍牛膝廣皮蝴蝶枳殼海松子從蓉柏子仁杞子陳右四十五歲發熱耳聾汗多便溏兩手自動神識昏糊焦山梔鉤鉤石斛二青鮮生地連翹鬱金決明陳膽星蠍尾法夏橘紅呂右四十一歲產將三月泛紅頗多入暮焦熱胃減身倦三春咳嗆尚未杜根杏仁麥冬橘紅驢膠生地白芍貝母枇杷葉丹皮螵蛸元參骨皮許右五十八歲痰阻於上濁阻於下翻胃膈症已達極點火麻仁鬱金穀芽竹茹咸從蓉廣皮絲瓜白芍姜半夏簍皮桃泥枳殼郭左二十四歲血行清道鼻紅已見三月濕阻營衛瘧疾發現一旬姜半夏黃柏生薑腹皮吳萸炒川連酒芩丹皮茶花軟柴胡秦艽橘紅知母徐右食滯中傷升降窒礙懊儂嘔泛食減便結脈象弦大而滑胃腑窒而不宣元胡炒川連腹皮橘紅竹茹廣鬱金茯神杏仁路通蔞皮云曲法夏吳左三十一歲新患咳嗆日漸而止舊患消長無常甜葶藶防己蘇於枳殺陳香椽皮骷髏青皮腹皮蜜炙麻黃沉香半夏杏仁計右三十八歲去秋崩漏旋則停止近十日來血塊疊下頭痛腰廢寐寤艱難小茴炒當歸桃肉丹參杜仲吳萸炒川連杞子川芎鳥藥官桂炒白芍東參茯神廣皮沈童腹大如墩阜四肢俱浮咳嗆氣急胃納不佳大腹皮川樸苓皮澤瀉葶藶子桂炒芍杏仁控涎丸豬苓東瓜子皮蘇子平左十六歲陽絡傷則鼻紅氣機阻則痞硬右腹滿大年輕非宜瓦楞蕪荑丹參鱉甲神麯銀胡茯苓海蜇查炭川連青皮銀花潘左四十二歲自胸及腹痛劇加捲上嘔清水亦不大便瓜蔞皮姜夏澄茄白芍黑乾姜蔞仁搖桂云曲薤白頭八月札廣皮路路通陳右三十三歲咳嗆失音胎前延及產後腹痛便溏往年宿根發現病纏四月形瘦冷熱脈虛舌薄延防蓐損鳳凰衣桔梗淡草枇杷葉北沙參牛膝貝母茯苓飯蒸於朮橘紅玄參牡蠣李童十二歲不軟吐血血來頗多病逾兩旬近發五天根生地牡蠣丹皮茅根黑旱蓮女貞橘紅側柏生三七功勞茯神牛膝葉左三十二歲脈滑屬痰脅屬氣痰聚氣機不通則瓜蔞皮橘紅絡枳殼二青白子腹皮砂殼冬瓜子皮萊菔子瓦楞茯苓瓜絡黃左腎關不固小溲頻多濕火乘虛下注膀胱氣化失權尺脈細清濕法扁豆知母竹葉荷梗黑梔廣皮草稍茯神潼蒺藜丹皮黃柏澤瀉董左預擬方養正氣清餘邪虛實兩相顧盼偏勝不致為害吉林參鬚甘草桑葉茯神冬瓜子橘紅扁豆綠豆扁石斛苡仁杏仁竹茹範左頭痛牽眉心悸身掣咳而多痰咽燥少津病根已有六年諸虛由此畢露叭杏仁滁菊橘紅白芍石決明丹參元參川貝黛蛤散桑葉雲苓枇杷葉範右懷孕之體不耐煩熱熱傷胎元腰腹作痛孕已九個足月猶慮帶病分娩形冷熱脘滿悶眩暈自汗脈滑舌薄當治其病母害其胎西洋參雲苓廣皮鉤鉤穭豆衣佩蘭滁菊杜仲冬桑葉佛手黃芩竹茹祝右氣血俱虧肝腎並傷不獨泛來衰少抑且諸症雜杜仲牡蠣奎芍玫瑰綿耆丹參穭衣螵蛸首烏歸身龍骨茯神許童咳稍緩血仍吐面浮足冷熱腹八歲童子已成童勞川貝穀芽冬瓜子皮枇耙葉杏仁茯苓百部款冬紫苑山藥於朮董右濁蒙清竅頭暈耳嗚濕阻氣機脘泛嘔惡近加憂鬱肝陽勃升法夏蒺藜蔻殼竹茹石決鉤鉤鬱金桑葉霍梗枳殼會皮滁菊石重暑風入肺食滯傷脾上有嘔吐下有泄瀉法半夏前胡扁豆杏仁廣木香苡仁象貝鉤鉤焦神麯橘紅通草竹茹曹右滿腹作愈而復發氣病應血月事愆期吳萸炒川連小茴鬱金砂殼桂枝炒白芍腹皮枳殼茺蔚冬風皮青皮茯苓路路通張左中脘痕滿已減飲食仍不多進有時氣不通順痛並作有時陽不潛降寤寐維艱種種病象仍在陽明腑絡改方法程尚宜通利腑絡金鈴千青皮枳殼腹皮北秫米姜夏伏苓絲瓜夜交藤鬱金橘紅路路通張左三十六歲脹在中脘痛在右腹中主胃右主氣胃氣失其下行右降遂為不及氣滯則痕氣則通久痛久入經入絡大便艱澀納食減進舌質糙白而厚脈沉滯不暢胃者為六腑之總司胃病則六腑亦病按腑以通為用法當以通為耍兩頭尖姜夏金鈴青皮枳殼桃仁彩雲粬檳榔瓦楞瓜蔞絲瓜絡路路通趙右五十歲飲停於中噫噯吞酸寤寐欠寧時有眩暈萸炒連桂芍佛手竹茹炒秫米半夏橘紅甘草黑乾姜雲苓夜交枳殼又左十九歲咽喉間癢膺脘亦癢蒂丁下垂水虧火旺左牡蠣黃柏元參桔梗炙鱉甲丹皮生地秋石坎版淡草莫肉知母厲右二十歲手少陰火旺並足少陰水虧肺有風熱鼻竅為之成淵胃有濕火蒂丁為之下垂精為火動則夢遺絡為火燥則痰血頭目眩暈頸背絡痛舌質黃脈細弦症複雜治不易制萸肉川貝茅根茯苓旱蓮草牡蠣女貞橘紅功勞葉丹皮蓮鬚生地王左三十五歲能食而不能化其咎在脾血虛而氣不調其病在肝肝為剛臟燥則益剛脾為濕土滯則益濕肌膚乾燥更衣艱澀脈象細弦舌質糙膩治法須養氣血藉以灌輸肝脾唯牛膝柏仁當歸從蓉遠志肉棗仁白芍穀芽甘杞子麻仁廣皮芝麻陳左四十三歲生石膏知母元參桔梗川貝母淡草絲瓜絡海石煆蛤殼苡仁蘆根瓊玉膏李左四十三歲素體水不涵木漸至木火刑金先咳而後失血自春延至立夏痰阻於肺氣失宣華胸脘滿悶缺盆痛左升太過右降不及動輒氣甚而咳嗽脈弦細而數法養金柔木金沸草元參石決枇杷葉女貞子川貝牛膝橘絡青蛤殼丹皮茅根旱蓮羅二十五歲少陰腎虧太陰脾濕濕聚蒸化為痰效嗆頭腰痠肢耍脈象弦滑舌質膩白陰虛生火耗傷胃津故口渴喜飲小溲紅赤腎清脾濕黃草川石斛仙夏淡草橘紅雲茯苓瓜子川貝牡蠣滁菊桑葉牛膝苡仁竹茹張左左右脈均弦滑弦主飲滑主痰痰飲盤踞中上兩窒礙上下呼吸肺不降腎不納動輒氣逆狀如喘急素有遺泄腎陰久耗多年老病根深蒂固元武版橘紅炙草茯苓鱉甲川貝杏仁牡蠣冬蟲牛膝六粬石英朱左心多悸夜少寐盜汗精滑心腎不交左牡蠣龍骨甘草棗仁遠志肉蓮鬚茯苓知母川柏丹參生地柏仁李右脘痞痛經淋帶多脈象弦細舌質薄黃陽明不合衝任不固患起小產已越一年氣血已受戕傷諸恙遂為雜出闔陽明之氣固沖海之血潞黨參遠志海蛸川芎炙綿耆茯苓棗仁牡蠣杜仲白芍丹參茺蔚朱右未產先紲既牽又瀉綿纏一年脾腎陰中之陽虛矣於是滿痛泄瀉劇於清朝時候前半舌貿淡絳脈象左尺濡大雙補脾腎藉資連納巴戟天潼蒺藜兔絲子破故紙奎白芍煨肉果淡吳萸五味子懷山藥土炒於朮雲茯苓穀芽陳左咳嗆五年氣急三載近加喪明嗔怒肝氣升熾化火迫傷絡脈吐血復崩秉即鼻血亦是絡熱左脈大擬潛育大生地准牛膝粉丹皮石決明山茶花墨旱蓮女貞子橘絡川貝母湖藕節白茅根錦紋黃又血從清道由鼻而出從濁道由口而來咳嗆氣急輾轉不停喪明嗔怒氣鬱不舒左關脈大法當潛降橘紅絡叭杏仁丹皮降香准牛膝茯苓白芍川貝青蛤散藕節茅根山茶沈左大便有血小溲痠痛瘧發三陰已有半年制草莫鱉甲秦艽槐米制首烏川柏知母草梢姜半夏萆茯苓桂拌白芍又右四十歲津液為火消爍漸成三消大症形瘦善食口渴喜歡溲濁頻多舌根脫苔腹笥似覺痞滿脈象兼見弦濡仿用知柏八味丸籍以壯水制火知母黃柏生地山藥萸肉丹皮澤瀉元參茯苓麥冬天冬石斛盛右四十五歲肝腎陰虛沖任失司經訊超前帶下殊多中間痰飲盤踞咳嗆作輟無常杜仲芸苓川貝蒺藜竹茹叭杏丹參半夏粬石英芡實蓮鬚橘紅姜右三十一歲經來衰少五年不育血虛氣滯累及衝任當歸柴胡白芍茺蔚川貝橘紅丹參杏仁海峭香附丹皮玟瑰李左四十八歲肝腎不足肺胃有火屢次失血時常咳嗆去冬曾經先音今春復加腰痛脈象細數法當潛育甘草玉竹女貞旱蓮龜版前胡丹皮杏仁生地川貝橘紅茯苓郁右三十歲去冬三瘧近來無緒熱勢燎原略有咳嗆鱉甲銀胡蒿子秦艽白前骨皮知母桑葉丹皮桂芍杏仁竹茹顧左六十歲有年氣血本袞病後氣血更弱頭而多汗腰痛膝酸步履少力黨參牡蠣甘草桂芍冬朮龍齒黃耆茯苓夏曲磁石冬瓜皮陳右四十一歲血虛生風心悸肢振目盲多淚頭痛偏左白歸身澤瀉杞子甘菊大熟地白芍茯苓蒺藜制萸肉丹皮山藥桑葉毛左二十二歲心腎素虧蘿遺頻至嗜酒致傷陽絡絡松血從上溢陡燃吐血二十餘口陰虧陽亢時多冒熱脈細舌黃法當潛育紫丹參丹皮茯神蓮鬚川雅連龜版茅根葛花雞距子石決桑葉山梔平右三十九歲產後腠理空虛寒邪易於侵襲形寒頭暈脘痛腹痛東洋參龍骨姜夏佛手牡蠣首烏穀芽廣皮杞子沙參白芍蝴蝶唐右二十二歲咳嗆自冬而起經泛自春而停聲嘶音啞咽燥喉痛虛火上爍已成勞損淡秋石牛膝冬蟲草桔梗川貝元參蘆根青蛤杏仁甘草米仁枇杷葉俞左四十九歲便溏四年胸滿五日脾升胃降已失常度制川樸姜夏木香茯苓枳殼拌炒白朮扁豆砂仁殼芽彩雲粬廣皮腹皮冬瓜皮李左四十三歲少陰水虧太陰金燥肝腎龍相之火乘氣上擾遂使肺絡受傷先咳後血肝木之氣多升肺金之氣少降氣逆作咳嗽甚作嘔脈象濡細舌質光剝俾能帶病延年亦是人功克盡旋覆淡秋石牛滕川貝麥冬蛤殼元參女貞丹皮旱蓮絲瓜冬蟲草吳右三十六歲隱情曲意不伸氣血俱少流暢肝木犯胃飲邪留中嘔泛清水胸悶作痛久痛則氣愈亂氣亂則病愈甚奇經亦受影響月事愆期腰間廢楚六部脈象均見沉澀當調肝胃以利奇經上猺桂鬱金香附甘松萸炒白芍姜夏烏藥八紮佛手柑廣皮枳殼獺乾陸左三十九歲陽動於絡陽即氣動則跳偏在於左左主血而主於肝有夢則遺無夢則滑耳嗚頭暈腰痠脈細心腎陰虧肝膽陽亢病自七清中來切宜顧養為上石決明浮小麥棗仁橘絡遠志肉淡甘草芝麻桑葉粉丹皮云茯神蓮鬚滁菊施左十七歲病起半月形寒身熱有汗而熱不散有咳而痰不利焦山梔橘紅絲瓜絡蘆根瓜蔞皮茯神知母米仁川通草杏仁竹茹沈左三十四歲夢中遺溲便後痔血脾腎陰虧濕火下注沙苑子芡實白芍遠志綿杜仲丹參葛花木香炒槐米茯神棗仁冬朮許左二十二歲形瘦便溏脾腎陽虛頭量咳嗆肝肺風熱廣木香川貝冬瓜子茯苓炒扁豆杏仁蒺藜冬朮法半夏前胡桑葉砂殼朱左二十七歲中脘痞時作時輟少腹瘕聚時上時下食後則吐便秘半月胃氣不降腑氣不通氣鬱化火津傷咽乾鮮石斛蔞仁半夏橘白咸從蓉麻仁松子仁穀芽炙枳殼柏仁郁李仁姜竹茹朱左二十六歲咳引胸痛喉癢有痰有時頭暈有時身熱瓜簍皮前胡橘紅杏仁生薏仁茯苓絲瓜絡桑葉地骨皮淡草元參二青趙左二十六歲中虛濕勝氣攻脘痛痛甚吐瀉根超五年姜夏冬朮云粬砂仁枳殼川樸炙草腹皮木香廣皮穀芽附炒瀉李左三十七歲金水兩虧肝脾氣逆效嗆失血咽痛喉痹盜杆時有時無大便時溏時結左脈虛弦右脈細數勞損已達極點夏秋最為吃緊大生地川貝丹皮桔梗黑豆衣牡蠣元參絲瓜子冬蟲草淡草薏仁蘆根周右二十七歲左咽稍痛黎明便溏起由產徒將成蓐勞北沙參冬瓜子丹參麥冬牡蠣丹皮白芍銀胡炙草地骨螵蛸川斛羅左囊癰一年夜不多寐陽陰造偏冷熱頭暈真滁菊焦山梔夜交藤秫小米冬桑葉廣皮粉丹皮姜半夏茯神石決明酸棗仁竹茹趙左四十八歲咽喉作哽胸悶飽痕火炎於上痰阻於中淡秋石橘紅川貝丹皮淡草竹茹瓦楞柿霜蔞皮桔梗元參橄欖陳右四十三歲火炎則金傷氣宴則失音治節失司肩背痠痛生石膏知母甘草絲瓜絡米仁蛤亮桔梗元參川貝蘆根海石瓊玉膏陳童暑氣由肺胃充斥三焦蔓延氣分外達肌膚而為㾦㾦發不多邪勢未能清徹致令中脘懊儂神識乍清乍昏身體忽寒忽熱脈象左部沉弦右部滑數體素薄弱正氣不能截邪以致留戀於中姑擬扶正逐邪未識然否佛葉參川通草茯神銀花連翹鮮石斛蒿梗鬱金丹皮鮮生地蘆根益元散欽右二十四歲先由白帶繼而赤帶益於經水淋漓甚而色紫起塊少腹抽痛牽及經絡形寒頭痛脘泛食少脈象弦芤舌質膩白病在奇經八脈尚挾寒濕阻遏治法益氣血之虛參用通氣血之滯紫丹參茺蔚橘紅草淮牛膝法夏石英丹皮陳阿膠新絳白芍螵蛸又二方肝腎陰虛沖任失固自白帶而轉赤色由經漏而至成塊血既失其所養氣遂乘於脈絡少腹掣痛面目浮冷熱頭痛耳嗚盜汙脈象弦芤而滑舌質薄膩而白脾胃為濕所困治法緩根滋補旋覆新絳歸鬚萆丹參丹皮杜仲白蒺螵蛸茯苓白芍白朮章左二十三歲舊冬吐血盈盞今春腹大加鼓氣血相擊清濁相混已成蠱脹延為難治桃仁泥腹皮沉香牛膝炙鱉甲當歸橘絡鈴子參三七青皮延胡控涎丸徐左三十歲初必屬風水相縛久腫必屬脾腎兩虧晨起上焦為午後下焦為腹笥得谷更甚心腎兩虧夢道頻多脈沉弦舌紅絳兩補脾腎兼搜風水沙知母黃柏澤瀉附片拌薏仁上猺桂萸肉茯苓穀芽大熟地丹皮牛膝車前金左二十四歲肝強脾弱氣滯濕勝水穀易停腹笥易制川樸穀芽姜夏澤瀉大腹皮砂殼廣皮芡實彩雲粬茯苓枳殼竹茹史左三十五歲風濕阻氣咳嗆痰黏咽喉腫爛已有兩旬煆石膏知母淡草元參活水蘆根桑葉杏仁枇杷葉連翹殼橘紅姜皮竹茹沈右三十七歲肺氣失其清肅咳嗆無痰肺氣通於表分衛虛畏寒生綿耆蘇子橘紅冬朮旋覆花杏仁川貝防風桂炒白芍白前薏仁枇杷葉余左四十二歲痢下紅黑去秋及今東洋參槐米木香廣皮枳炒冬朮肉菓砂仁白芍胡桃炒故紙淡乾姜茯苓炙草許左四十二歲痢紅數月後重腹痛川雅連白頭翁春砂仁廣木香炒銀花秦皮查炭酒芩炒扁豆廣陳皮薑炭云粬楊左向有哮喘近加咳嗆痰滯氣機脘宇遏塞旋覆蘇子甘草冬瓜子皮海石芥子橘紅雲苓瓦楞杏仁法夏二青呂左三十八歲素有哮喘舊冬增劇氣逆礙臥痰味帶咸肺實瀉之腎虛納之旋覆花杏仁夏粬茯苓乾姜搗五味子麻黃貝母海石淮牛膝橘紅亭藶竹茹姚左二十四歲負傷吐血脈象小弦雖有離絡之血不可止澀為事參三七女貞大黃絲瓜絡仙鶴草丹皮白芍茅根墨旱蓮橘絡牛膝藕節王左七十八歲高年血少氣衰中焦連磨失職得食作夜寐不安咸從蓉炙草刀豆鬱金吳萸炒川連廣皮川椒白芍咸半夏雲苓烏梅竹茹楊左四十歲積勞積濕傷氣傷脾得食腹面黃帶浮泔茅朮雲苓冬瓜皮芽谷川樸廣皮澤瀉砂殼綿茵陳腹皮枳殼黑梔沈左三十四歲痛在於右右屬氣滯久痛有塊是謂痞氣淡乾姜甲片香附三稜紅花元胡枳殼鬱金吳萸炒川連青皮蓬朮鈴子左四十九歲勞傷氣分咳嗆一月肺燥脾濕治當兩顧旋覆花蛤殼炙草二青叭杏仁橘紅貝母枇耙葉半夏粬雲苓桑葉梨子徐右三十五歲舊夏產育傷元繼而咳嗆水瀉冷熱食廢蓐勞難圖別直參於朮穀芽杏仁清炙草麥冬肉菓貝母淮山藥橘紅茯苓白芍潘左二十五歲脾腎為食致傷消化遂失常度得食作甚而噯酸制川樸云粬鬱金穀芽淡吳萸權殼廣皮砂殼雞肫皮雲苓姜夏腹皮欽右少腹之痛已減經帶之淋依然八脈之虧陽維為痛苦寒泄熟此內經篇之言也氣分兼挾濕邪清濁失調升降失司足腿為舌質薄黃脈象弦細平補肝腎之陰參化脾胃之濕淡從蓉金拂草新絳杜仲川柏片甘相子茯苓忍冬川萆紫丹參知母螵蛸張酒醴之熱灼傷肺胃先乾咳繼口血根起四年時欲舉發口燥脈細冷熱盜汗夏令升泄最易增劇旋覆牛膝女貞旱蓮秋石杏仁元參貝母甘草知母橘紅絡茅根姚左四十二歲痰滯於膈氣滯於中脘腹痞滿咳嗆氣逆二便皆滯六脈弦細參滌其痰雅連杏仁橘紅川樸枳殼姜皮瓦楞蘇子桃仁竹茹
